name: Build Lex Programs

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies (Flex, Bison, and GCC)
      run: |
        sudo apt-get update
        sudo apt-get install -y flex bison gcc

    - name: Compile all .l and .y programs
      run: |
        set -eo pipefail

        ORIG_DIR=$(pwd)
        DIRS_ARRAY=()

        # Find all directories containing .l files and store in array to avoid subshell issues
        while IFS= read -r -d '' dir; do
          DIRS_ARRAY+=("$dir")
        done < <(find . -type f -name "*.l" -printf '%h\0' | sort -uz)

        # Process each directory
        for dir in "${DIRS_ARRAY[@]}"; do
          echo "========================================"
          echo "Processing directory: $dir"

          cd "$ORIG_DIR/$dir"
          base=$(basename "$PWD")

          # Check if there's a .y file in this directory
          y_file=$(ls *.y 2>/dev/null | head -1)
          l_file=$(ls *.l 2>/dev/null | head -1)

          if [ -n "$y_file" ]; then
            echo "Found Yacc file: $y_file"
            # Generate parser from Yacc file
            bison -d "$y_file"
            echo "Generated parser files from $y_file"
          fi

          if [ -n "$l_file" ]; then
            echo "Found Lex file: $l_file"
            # Generate lexer from Lex file
            # --noyywrap avoids needing libfl-dev just for yywrap()
            flex --noyywrap "$l_file"
            echo "Generated lexer from $l_file"
          fi

          # Determine which C files to compile
          c_files="lex.yy.c"
          if [ -n "$y_file" ]; then
            y_base=$(basename "$y_file" .y)
            c_files="$c_files $y_base.tab.c"
          fi

          # Compile all generated C files
          echo "Compiling: $c_files"
          gcc $c_files -o "$base.out"

          # Check if compilation was successful
          if [ -f "$base.out" ]; then
            echo "Successfully built $base.out"
          else
            echo "::error::Failed to build in $dir"
            exit 1
          fi

          # Clean up generated files to keep the workspace tidy
          rm -f lex.yy.c *.tab.c *.tab.h
        done